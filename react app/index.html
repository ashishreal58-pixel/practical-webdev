<!-- The Button -->
<button id="likeBtn" style="padding: 10px 20px; cursor: pointer;">
  ❤️ Like
</button>

<script>
  // 1. Select the button
  const button = document.getElementById('likeBtn');

  // 2. Attach the event listener
  button.addEventListener('click', () => {
    const msg = "Thanks for the love! ❤️";

    // 3. Show the Alert
    alert(msg);

    // 4. Log to the Console
    console.log("User action: " + msg);
  });
</script>
